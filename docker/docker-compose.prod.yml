# BCS Production Network Docker Compose
# =======================================
# Production-grade deployment with:
#   • 3 validator nodes (distributed consensus)
#   • 2 observer / RPC nodes (high-availability API)
#   • nginx load balancer with SSL termination
#   • Prometheus metrics scraping (port 9090)
#   • Persistent named volumes on host
#
# Prerequisites:
#   • Docker Engine 24.0+ with Swarm mode or Compose plugin
#   • Host directories created: /var/lib/bcs/node{1,2,3}, /var/lib/bcs/observer{1,2}
#   • SSL certificates in /etc/bcs/ssl/
#
# Deploy:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml ps
#   docker-compose -f docker-compose.prod.yml logs -f
#
# Upgrade:
#   docker-compose -f docker-compose.prod.yml build --no-cache
#   docker-compose -f docker-compose.prod.yml up -d

version: "3.8"

services:
  # --- Validator Nodes ---
  node1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    image: bcs-node:prod
    container_name: bcs-node1
    hostname: node1
    restart: unless-stopped
    ports:
      - "10001:10001"
    volumes:
      - /var/lib/bcs/node1:/data/bcs
      - ../config/testnet/node1.toml:/app/bcs_chain/config/node.toml:ro
    environment:
      - BCS_CONFIG=/app/bcs_chain/config/node.toml
      - PYTHONUNBUFFERED=1
    networks:
      - bcs-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  node2:
    image: bcs-node:prod
    container_name: bcs-node2
    hostname: node2
    restart: unless-stopped
    ports:
      - "10002:10002"
    volumes:
      - /var/lib/bcs/node2:/data/bcs
      - ../config/testnet/node2.toml:/app/bcs_chain/config/node.toml:ro
    environment:
      - BCS_CONFIG=/app/bcs_chain/config/node.toml
      - PYTHONUNBUFFERED=1
    networks:
      - bcs-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  node3:
    image: bcs-node:prod
    container_name: bcs-node3
    hostname: node3
    restart: unless-stopped
    ports:
      - "10003:10003"
    volumes:
      - /var/lib/bcs/node3:/data/bcs
      - ../config/testnet/node3.toml:/app/bcs_chain/config/node.toml:ro
    environment:
      - BCS_CONFIG=/app/bcs_chain/config/node.toml
      - PYTHONUNBUFFERED=1
    networks:
      - bcs-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Observer / RPC Nodes ---
  observer1:
    image: bcs-node:prod
    container_name: bcs-observer1
    hostname: observer1
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - /var/lib/bcs/observer1:/data/bcs
      - ../config/node.default.toml:/app/bcs_chain/config/node.toml:ro
    environment:
      - BCS_CONFIG=/app/bcs_chain/config/node.toml
      - PYTHONUNBUFFERED=1
    networks:
      - bcs-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  observer2:
    image: bcs-node:prod
    container_name: bcs-observer2
    hostname: observer2
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - /var/lib/bcs/observer2:/data/bcs
      - ../config/node.default.toml:/app/bcs_chain/config/node.toml:ro
    environment:
      - BCS_CONFIG=/app/bcs_chain/config/node.toml
      - PYTHONUNBUFFERED=1
    networks:
      - bcs-prod
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # --- Load Balancer ---
  nginx:
    image: nginx:alpine
    container_name: bcs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/bcs/ssl:/etc/nginx/ssl:ro
    networks:
      - bcs-prod
    depends_on:
      - observer1
      - observer2

  # --- Monitoring (optional) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: bcs-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - bcs-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

networks:
  bcs-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  prometheus-data:
